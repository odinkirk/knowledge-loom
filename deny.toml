[advisories]
ignore = [
    "RUSTSEC-2026-0041",  # lz4_flex vulnerability in tantivy 0.18, mitigated by safe-decode feature
    "RUSTSEC-2024-0384",  # instant crate unmaintained in tantivy 0.18
    "RUSTSEC-2025-0141",  # bincode 1.3.3 unmaintained in tantivy 0.18
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "NCSA",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
